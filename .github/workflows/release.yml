name: Package and Release Firefox Extension

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required extension files
        run: |
          missing=0
          for file in manifest.json popup/popup.html popup/popup.js content/content.js; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file '$file' is missing."
              missing=1
            else
              echo "OK: '$file' exists."
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Validation failed: one or more required files are missing."
            exit 1
          fi
          echo "All required extension files are present."

      - name: Package extension
        run: |
          zip -r volume-booster-extension.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "README.md"
          cp volume-booster-extension.zip volume-booster-extension.xpi

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: volume-booster-extension-zip
          path: volume-booster-extension.zip

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: volume-booster-extension-xpi
          path: volume-booster-extension.xpi

      - name: Generate release tag
        id: tag
        run: echo "TAG_NAME=v$(date -u +'%Y.%m.%d.%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: Release ${{ steps.tag.outputs.TAG_NAME }}
          generate_release_notes: true
          files: |
            volume-booster-extension.zip
            volume-booster-extension.xpi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
