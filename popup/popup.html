<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extreme Volume Booster</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 280px;
        padding: 20px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a2e;
        color: #eee;
      }

      h1 {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #a78bfa;
        margin-bottom: 16px;
        text-align: center;
      }

      .volume-display {
        text-align: center;
        font-size: 42px;
        font-weight: 700;
        color: #fff;
        line-height: 1;
        margin-bottom: 18px;
      }

      .volume-display span {
        font-size: 20px;
        color: #a78bfa;
        font-weight: 400;
      }

      .slider-wrapper {
        position: relative;
        padding: 4px 0;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(
          to right,
          #7c3aed 0%,
          #7c3aed var(--fill),
          #3b3b5c var(--fill),
          #3b3b5c 100%
        );
        outline: none;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #a78bfa;
        box-shadow: 0 0 6px rgba(167, 139, 250, 0.7);
        cursor: pointer;
        transition: background 0.2s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        background: #c4b5fd;
      }

      input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border: none;
        border-radius: 50%;
        background: #a78bfa;
        box-shadow: 0 0 6px rgba(167, 139, 250, 0.7);
        cursor: pointer;
        transition: background 0.2s;
      }

      input[type="range"]::-moz-range-thumb:hover {
        background: #c4b5fd;
      }

      .range-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
        font-size: 11px;
        color: #888;
      }

      .status {
        margin-top: 14px;
        text-align: center;
        font-size: 11px;
        color: #666;
        min-height: 16px;
      }

      .status.active {
        color: #6ee7b7;
      }

      .status.error {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <h1>🔊 Extreme Volume Booster</h1>

    <div class="volume-display">
      <span id="volumeLabel">100</span><span>%</span>
    </div>

    <div class="slider-wrapper">
      <input
        type="range"
        id="volumeSlider"
        min="1.0"
        max="5.0"
        step="0.1"
        value="1.0"
      />
    </div>

    <div class="range-labels">
      <span>100%</span>
      <span>500%</span>
    </div>

    <div class="status" id="status">Move the slider to boost volume</div>

    <script src="popup.js"></script>
  </body>
</html>
